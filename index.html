<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Mroczny Las</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }
#container { width:100vw; height:100vh; position:relative; cursor:crosshair; }
canvas { display:block; width:100%; height:100%; image-rendering:pixelated; }
#vignette { position:absolute; inset:0; pointer-events:none;
  background: radial-gradient(ellipse 38% 52% at center,
    transparent 0%,
    rgba(0,0,0,0.45) 55%,
    rgba(0,0,0,0.82) 80%,
    rgba(0,0,0,0.97) 100%); }
#noise { position:absolute; inset:0; pointer-events:none; opacity:0.045; }
#hud { position:absolute; top:14px; left:50%; transform:translateX(-50%); color:#3d6b3d; font-size:13px; text-align:center; letter-spacing:3px; text-shadow:0 0 12px #0a2a0a; pointer-events:none; }
#click_msg { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); color:#2a4a2a; font-size:12px; letter-spacing:2px; transition:opacity 0.5s; }
#crosshair { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; }
#crosshair::before { content:''; position:absolute; top:6px; left:0; width:14px; height:1px; background:#2a5a2a; opacity:0.5; }
#crosshair::after  { content:''; position:absolute; top:0; left:6px; width:1px; height:14px; background:#2a5a2a; opacity:0.5; }
</style>
</head>
<body>
<div id="container">
  <canvas id="gc"></canvas>
  <canvas id="noise"></canvas>
  <div id="vignette"></div>
  <div id="hud">MROCZNY LAS v1.2</div>
  <div id="click_msg">[ KLIKNIJ ABY WEJŚĆ DO LASU ]</div>
  <div id="crosshair"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  /* ── SZUM FILMOWY ─────────────────────────────────────── */
  const noiseCanvas = document.getElementById('noise');
  const nctx = noiseCanvas.getContext('2d');
  function resizeNoise(){
    noiseCanvas.width  = Math.floor(window.innerWidth  * 0.35);
    noiseCanvas.height = Math.floor(window.innerHeight * 0.35);
  }
  resizeNoise();
  let noiseFrame = 0;
  function drawNoise(){
    noiseFrame++;
    // Odświeżaj co 2 klatki — oszczędność CPU i retro feel
    if(noiseFrame % 2 === 0){
      const w = noiseCanvas.width, h = noiseCanvas.height;
      const img = nctx.createImageData(w, h);
      const d = img.data;
      for(let i=0;i<d.length;i+=4){
        const v = (Math.random()*255)|0;
        d[i]=v; d[i+1]=v; d[i+2]=v; d[i+3]=255;
      }
      nctx.putImageData(img,0,0);
    }
    requestAnimationFrame(drawNoise);
  }
  drawNoise();
  /* ──────────────────────────────────────────────────────── */

  const container = document.getElementById('container');
  const canvas    = document.getElementById('gc');
  const W = window.innerWidth, H = window.innerHeight;
  canvas.width = W; canvas.height = H;

  const renderer = new THREE.WebGLRenderer({canvas, antialias:false});
  renderer.setSize(W, H, false);
  renderer.setPixelRatio(1);
  renderer.shadowMap.enabled = false;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);
  // Mgła czarna
  scene.fog = new THREE.FogExp2(0x000000, 0.085);

  const camera = new THREE.PerspectiveCamera(80, W/H, 0.05, 90);
  camera.position.set(0, 1.65, 0);

  scene.add(new THREE.AmbientLight(0x030804, 1.0));
  const moon = new THREE.DirectionalLight(0x060e06, 0.4);
  moon.position.set(-20, 40, -10);
  scene.add(moon);

  /* ── LATARKA ─────────────────────────────────────────── */
  const flashlight = new THREE.SpotLight(0xc8e8c0, 5.5);
  flashlight.angle    = Math.PI / 11;
  flashlight.penumbra = 0.55;
  flashlight.decay    = 1.8;
  flashlight.distance = 28;
  flashlight.castShadow = false;
  const flashTarget = new THREE.Object3D();
  scene.add(flashTarget);
  flashlight.target = flashTarget;
  scene.add(flashlight);
  const flFill = new THREE.PointLight(0x8dc88d, 0.7, 3.5);
  scene.add(flFill);
  /* ──────────────────────────────────────────────────────── */

  /* ── PODŁOŻE ─────────────────────────────────────────── */
  const groundGeo = new THREE.PlaneGeometry(1600, 1600, 60, 60);
  const gv = groundGeo.attributes.position;
  for(let i=0;i<gv.count;i++) gv.setY(i,(Math.random()-0.5)*0.18);
  groundGeo.computeVertexNormals();
  const ground = new THREE.Mesh(groundGeo, new THREE.MeshLambertMaterial({color:0x040b03}));
  ground.rotation.x = -Math.PI/2;
  scene.add(ground);
  /* ──────────────────────────────────────────────────────── */

  /* ── DRZEWA ──────────────────────────────────────────── */
  function addTree(x, z){
    const h     = 5 + Math.random()*10;
    const thick = 0.12 + Math.random()*0.22;
    const tg = new THREE.CylinderGeometry(thick*0.55, thick, h*0.55, 6, 2);
    const tv = tg.attributes.position;
    for(let i=0;i<tv.count;i++){
      tv.setX(i, tv.getX(i)+(Math.random()-0.5)*0.05);
      tv.setZ(i, tv.getZ(i)+(Math.random()-0.5)*0.05);
    }
    tg.computeVertexNormals();
    const trunk = new THREE.Mesh(tg, new THREE.MeshLambertMaterial({color:new THREE.Color(0.022,0.016,0.009)}));
    trunk.position.set(x, h*0.55/2, z);
    scene.add(trunk);
    const layers = 3 + Math.floor(Math.random()*3);
    for(let i=0;i<layers;i++){
      const ratio = 1 - i/layers;
      const cr = (thick*5 + Math.random()*0.7) * ratio * 1.5;
      const ch = (1.8 + Math.random()*1.4) * ratio + 0.8;
      const cg = new THREE.ConeGeometry(cr, ch, 6+Math.floor(Math.random()*3));
      const cv2 = cg.attributes.position;
      for(let j=0;j<cv2.count;j++){
        cv2.setX(j, cv2.getX(j)+(Math.random()-0.5)*0.1);
        cv2.setZ(j, cv2.getZ(j)+(Math.random()-0.5)*0.1);
      }
      cg.computeVertexNormals();
      const d = 0.016 + Math.random()*0.02;
      const cone = new THREE.Mesh(cg, new THREE.MeshLambertMaterial({color:new THREE.Color(d*0.55,d,d*0.45)}));
      cone.position.set(x+(Math.random()-0.5)*0.12, h*0.38 + i*(ch*0.52), z+(Math.random()-0.5)*0.12);
      scene.add(cone);
    }
    return {x, z, r: thick*1.8+0.15};
  }

  function addDeadTree(x, z){
    const h     = 6 + Math.random()*6;
    const thick = 0.07 + Math.random()*0.12;
    const mat   = new THREE.MeshLambertMaterial({color:0x030301});
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(thick*0.3,thick,h,5), mat);
    trunk.position.set(x, h/2, z);
    trunk.rotation.z = (Math.random()-0.5)*0.14;
    scene.add(trunk);
    for(let i=0;i<5;i++){
      const bLen = 0.8 + Math.random()*2.0;
      const bh   = h*0.45 + Math.random()*h*0.45;
      const b = new THREE.Mesh(new THREE.CylinderGeometry(0.02,thick*0.3,bLen,4), mat);
      b.position.set(x+Math.cos(i*1.3)*bLen*0.4, bh, z+Math.sin(i*1.3)*bLen*0.4);
      b.rotation.z = (Math.random()-0.5)*1.4;
      b.rotation.y = Math.random()*Math.PI*2;
      scene.add(b);
    }
    return {x, z, r:0.12};
  }
  /* ──────────────────────────────────────────────────────── */

  /* ── GENEROWANIE LASU 4x (względem poprzedniej wersji) ── */
  const trees = [];
  // Bliska warstwa
  for(let i=0;i<20;i++){
    const a=(i/20)*Math.PI*2+Math.random()*0.5, d=4+Math.random()*7;
    trees.push(addTree(Math.cos(a)*d, Math.sin(a)*d));
  }
  // Warstwa 2
  for(let i=0;i<90;i++){
    const a=(i/90)*Math.PI*2+Math.random()*0.6, d=12+Math.random()*18;
    trees.push(Math.random()<0.2 ? addDeadTree(Math.cos(a)*d,Math.sin(a)*d) : addTree(Math.cos(a)*d,Math.sin(a)*d));
  }
  // Warstwa 3
  for(let i=0;i<220;i++){
    const a=Math.random()*Math.PI*2, d=30+Math.random()*30;
    trees.push(Math.random()<0.15 ? addDeadTree(Math.cos(a)*d,Math.sin(a)*d) : addTree(Math.cos(a)*d,Math.sin(a)*d));
  }
  // Warstwa 4
  for(let i=0;i<380;i++){
    const a=Math.random()*Math.PI*2, d=60+Math.random()*50;
    trees.push(addTree(Math.cos(a)*d, Math.sin(a)*d));
  }
  // Warstwa 5
  for(let i=0;i<480;i++){
    const a=Math.random()*Math.PI*2, d=110+Math.random()*80;
    trees.push(addTree(Math.cos(a)*d, Math.sin(a)*d));
  }
  // Warstwa 6
  for(let i=0;i<560;i++){
    const a=Math.random()*Math.PI*2, d=190+Math.random()*100;
    trees.push(addTree(Math.cos(a)*d, Math.sin(a)*d));
  }
  // Ściana zewnętrzna
  for(let i=0;i<300;i++){
    const a=(i/300)*Math.PI*2, d=290+Math.random()*10;
    trees.push(addTree(Math.cos(a)*d, Math.sin(a)*d));
  }
  /* ──────────────────────────────────────────────────────── */

  /* ── KAMIENIE ─────────────────────────────────────────── */
  for(let i=0;i<350;i++){
    const a=Math.random()*Math.PI*2, d=2+Math.random()*280, s=0.1+Math.random()*0.5;
    const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(s,0),
      new THREE.MeshLambertMaterial({color:new THREE.Color(0.03,0.038,0.024)}));
    rock.position.set(Math.cos(a)*d, s*0.35, Math.sin(a)*d);
    rock.rotation.set(Math.random(),Math.random(),Math.random());
    scene.add(rock);
  }
  /* ──────────────────────────────────────────────────────── */

  /* ── MGŁA WOLUMETRYCZNA — 3 warstwy ─────────────────── */
  // Warstwa drobna — unosi się
  const mPos1 = new Float32Array(2000*3);
  for(let i=0;i<2000;i++){
    const a=Math.random()*Math.PI*2, d=Math.random()*280;
    mPos1[i*3]=Math.cos(a)*d; mPos1[i*3+1]=0.1+Math.random()*2.2; mPos1[i*3+2]=Math.sin(a)*d;
  }
  const mGeo1 = new THREE.BufferGeometry();
  mGeo1.setAttribute('position', new THREE.BufferAttribute(mPos1,3));
  const mist1 = new THREE.Points(mGeo1, new THREE.PointsMaterial({color:0x0e220e,size:1.8,transparent:true,opacity:0.28,sizeAttenuation:true}));
  scene.add(mist1);

  // Warstwa gruba — przy ziemi
  const mPos2 = new Float32Array(600*3);
  for(let i=0;i<600;i++){
    const a=Math.random()*Math.PI*2, d=Math.random()*260;
    mPos2[i*3]=Math.cos(a)*d; mPos2[i*3+1]=Math.random()*0.7; mPos2[i*3+2]=Math.sin(a)*d;
  }
  const mGeo2 = new THREE.BufferGeometry();
  mGeo2.setAttribute('position', new THREE.BufferAttribute(mPos2,3));
  const mist2 = new THREE.Points(mGeo2, new THREE.PointsMaterial({color:0x0a1a0a,size:6.5,transparent:true,opacity:0.13,sizeAttenuation:true}));
  scene.add(mist2);

  // Warstwa masywna — kłęby w oddali
  const mPos3 = new Float32Array(200*3);
  for(let i=0;i<200;i++){
    const a=Math.random()*Math.PI*2, d=15+Math.random()*240;
    mPos3[i*3]=Math.cos(a)*d; mPos3[i*3+1]=0.5+Math.random()*3.5; mPos3[i*3+2]=Math.sin(a)*d;
  }
  const mGeo3 = new THREE.BufferGeometry();
  mGeo3.setAttribute('position', new THREE.BufferAttribute(mPos3,3));
  const mist3 = new THREE.Points(mGeo3, new THREE.PointsMaterial({color:0x081208,size:14,transparent:true,opacity:0.07,sizeAttenuation:true}));
  scene.add(mist3);
  /* ──────────────────────────────────────────────────────── */

  /* ── STEROWANIE ───────────────────────────────────────── */
  const keys = {};
  document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
  });
  document.addEventListener('keyup', e => { keys[e.code] = false; });

  let yaw=0, pitch=0, locked=false, t=0;

  container.addEventListener('click', () => container.requestPointerLock());
  document.addEventListener('pointerlockchange', () => {
    locked = document.pointerLockElement === container;
    document.getElementById('click_msg').style.opacity = locked ? '0' : '1';
  });
  document.addEventListener('mousemove', e => {
    if(!locked) return;
    yaw   -= e.movementX * 0.0022;
    pitch  = Math.max(-0.55, Math.min(0.55, pitch - e.movementY*0.0022));
  });

  function collides(nx, nz){
    if(Math.sqrt(nx*nx+nz*nz) > 292) return true;
    for(const tr of trees){
      const dx=nx-tr.x, dz=nz-tr.z;
      if(dx*dx+dz*dz < (tr.r+0.3)*(tr.r+0.3)) return true;
    }
    return false;
  }

  const fwd=new THREE.Vector3(), rgt=new THREE.Vector3();
  const SPEED = 0.062;
  const flDir = new THREE.Vector3();
  const handOff = new THREE.Vector3();

  function loop(){
    requestAnimationFrame(loop);
    t += 0.016;

    camera.rotation.order = 'YXZ';
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;

    fwd.set(Math.sin(yaw), 0, Math.cos(yaw));
    rgt.set(Math.cos(yaw), 0, -Math.sin(yaw));

    let mx=0, mz=0;
    if(keys['KeyW']||keys['ArrowUp'])    { mx-=fwd.x; mz-=fwd.z; }
    if(keys['KeyS']||keys['ArrowDown'])  { mx+=fwd.x; mz+=fwd.z; }
    if(keys['KeyA']||keys['ArrowLeft'])  { mx-=rgt.x; mz-=rgt.z; }
    if(keys['KeyD']||keys['ArrowRight']) { mx+=rgt.x; mz+=rgt.z; }

    const len = Math.sqrt(mx*mx+mz*mz);
    if(len>0){ mx=mx/len*SPEED; mz=mz/len*SPEED; }

    const nx=camera.position.x+mx, nz=camera.position.z+mz;
    if(!collides(nx,nz)){ camera.position.x=nx; camera.position.z=nz; }

    camera.position.y = 1.65 + (len>0 ? Math.sin(t*8)*0.04 : 0);

    // Latarka
    handOff.set(0.22, -0.12, 0);
    handOff.applyEuler(new THREE.Euler(0, yaw, 0));
    flashlight.position.copy(camera.position).add(handOff);
    flFill.position.copy(camera.position);
    flDir.set(
      Math.sin(yaw) * Math.cos(pitch),
      Math.sin(pitch),
      Math.cos(yaw) * Math.cos(pitch)
    ).multiplyScalar(-1);
    flashTarget.position.copy(camera.position).add(flDir.multiplyScalar(12));

    // Mgła dryfuje
    mist1.rotation.y += 0.00012;
    mist2.rotation.y -= 0.00008;
    mist3.rotation.y += 0.00005;

    renderer.render(scene, camera);
  }
  loop();
  /* ──────────────────────────────────────────────────────── */

  window.addEventListener('resize', () => {
    const w=window.innerWidth, h=window.innerHeight;
    camera.aspect = w/h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
    resizeNoise();
  });
})();
</script>
</body>
</html>
