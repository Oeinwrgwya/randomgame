<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Mroczny Las</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }
#container { width:100vw; height:100vh; position:relative; cursor:crosshair; }
canvas { display:block; width:100%; height:100%; image-rendering:pixelated; }
#vignette { position:absolute; inset:0; pointer-events:none;
  background: radial-gradient(ellipse 38% 52% at center,
    transparent 0%,
    rgba(0,0,0,0.45) 55%,
    rgba(0,0,0,0.82) 80%,
    rgba(0,0,0,0.97) 100%); }
#hud { position:absolute; top:14px; left:50%; transform:translateX(-50%); color:#3d6b3d; font-size:13px; text-align:center; letter-spacing:3px; text-shadow:0 0 12px #0a2a0a; pointer-events:none; }
#click_msg { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); color:#2a4a2a; font-size:12px; letter-spacing:2px; transition:opacity 0.5s; }
#crosshair { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; }
#crosshair::before { content:''; position:absolute; top:6px; left:0; width:14px; height:1px; background:#2a5a2a; opacity:0.5; }
#crosshair::after  { content:''; position:absolute; top:0; left:6px; width:1px; height:14px; background:#2a5a2a; opacity:0.5; }
</style>
</head>
<body>
<div id="container">
  <canvas id="gc"></canvas>
  <div id="vignette"></div>
  <div id="hud">MROCZNY LAS v1.1</div>
  <div id="click_msg">[ KLIKNIJ ABY WEJŚĆ DO LASU ]</div>
  <div id="crosshair"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  const container = document.getElementById('container');
  const canvas    = document.getElementById('gc');

  const W = window.innerWidth, H = window.innerHeight;
  canvas.width = W; canvas.height = H;

  const renderer = new THREE.WebGLRenderer({canvas, antialias:false});
  renderer.setSize(W, H, false);
  renderer.setPixelRatio(1);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x010603);
  scene.fog = new THREE.FogExp2(0x020d04, 0.045);

  const camera = new THREE.PerspectiveCamera(80, W/H, 0.05, 120);
  camera.position.set(0, 1.65, 0);

  // Ambient bardzo ciemny
  scene.add(new THREE.AmbientLight(0x040a04, 1.2));

  // Księżyc — bardzo słabe światło z góry
  const moon = new THREE.DirectionalLight(0x081508, 0.5);
  moon.position.set(-20, 40, -10);
  scene.add(moon);

  // ── LATARKA ──────────────────────────────────────────────
  // SpotLight przywiązany do kamery
  const flashlight = new THREE.SpotLight(0xc8e8c0, 3.5);
  flashlight.angle       = Math.PI / 11;   // wąski stożek
  flashlight.penumbra    = 0.55;           // miękka krawędź
  flashlight.decay       = 1.8;
  flashlight.distance    = 28;
  flashlight.castShadow  = false;
  // target będzie aktualizowany w pętli
  const flashTarget = new THREE.Object3D();
  scene.add(flashTarget);
  flashlight.target = flashTarget;
  scene.add(flashlight);

  // Delikatna poświata latarki tuż przed kamerą (fill)
  const flFill = new THREE.PointLight(0x8dc88d, 0.4, 2.5);
  scene.add(flFill);

  // ─────────────────────────────────────────────────────────

  // Podłoże — większy płat
  const groundGeo = new THREE.PlaneGeometry(400, 400, 40, 40);
  const gv = groundGeo.attributes.position;
  for(let i=0;i<gv.count;i++) gv.setY(i,(Math.random()-0.5)*0.18);
  groundGeo.computeVertexNormals();
  const ground = new THREE.Mesh(groundGeo, new THREE.MeshLambertMaterial({color:0x050c04}));
  ground.rotation.x = -Math.PI/2;
  scene.add(ground);

  // Drzewo z liśćmi
  function addTree(x, z){
    const h     = 5 + Math.random()*10;
    const thick = 0.12 + Math.random()*0.22;

    const tg = new THREE.CylinderGeometry(thick*0.55, thick, h*0.55, 6, 3);
    const tv = tg.attributes.position;
    for(let i=0;i<tv.count;i++){
      tv.setX(i, tv.getX(i)+(Math.random()-0.5)*0.05);
      tv.setZ(i, tv.getZ(i)+(Math.random()-0.5)*0.05);
    }
    tg.computeVertexNormals();
    const trunk = new THREE.Mesh(tg, new THREE.MeshLambertMaterial({color:new THREE.Color(0.025,0.018,0.01)}));
    trunk.position.set(x, h*0.55/2, z);
    scene.add(trunk);

    const layers = 3 + Math.floor(Math.random()*3);
    for(let i=0;i<layers;i++){
      const ratio = 1 - i/layers;
      const cr = (thick*5 + Math.random()*0.7) * ratio * 1.5;
      const ch = (1.8 + Math.random()*1.4) * ratio + 0.8;
      const cg = new THREE.ConeGeometry(cr, ch, 7+Math.floor(Math.random()*3));
      const cv2 = cg.attributes.position;
      for(let j=0;j<cv2.count;j++){
        cv2.setX(j, cv2.getX(j)+(Math.random()-0.5)*0.1);
        cv2.setZ(j, cv2.getZ(j)+(Math.random()-0.5)*0.1);
      }
      cg.computeVertexNormals();
      const d = 0.018 + Math.random()*0.022;
      const cone = new THREE.Mesh(cg, new THREE.MeshLambertMaterial({color:new THREE.Color(d*0.55,d,d*0.45)}));
      cone.position.set(x+(Math.random()-0.5)*0.12, h*0.38 + i*(ch*0.52), z+(Math.random()-0.5)*0.12);
      scene.add(cone);
    }
    return {x, z, r: thick*4.5+0.4};
  }

  // Martwe drzewo
  function addDeadTree(x, z){
    const h     = 6 + Math.random()*6;
    const thick = 0.07 + Math.random()*0.12;
    const mat   = new THREE.MeshLambertMaterial({color:0x040402});
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(thick*0.3,thick,h,5), mat);
    trunk.position.set(x, h/2, z);
    trunk.rotation.z = (Math.random()-0.5)*0.14;
    scene.add(trunk);
    for(let i=0;i<5;i++){
      const bLen = 0.8 + Math.random()*2.0;
      const bh   = h*0.45 + Math.random()*h*0.45;
      const b = new THREE.Mesh(new THREE.CylinderGeometry(0.02,thick*0.3,bLen,4), mat);
      b.position.set(x+Math.cos(i*1.3)*bLen*0.4, bh, z+Math.sin(i*1.3)*bLen*0.4);
      b.rotation.z = (Math.random()-0.5)*1.4;
      b.rotation.y = Math.random()*Math.PI*2;
      scene.add(b);
    }
    return {x, z, r:0.28};
  }

  // ── GENEROWANIE LASU 4x ──────────────────────────────────
  const trees = [];

  // Bliska warstwa
  for(let i=0;i<16;i++){
    const a=(i/16)*Math.PI*2+Math.random()*0.5, d=4+Math.random()*6;
    trees.push(addTree(Math.cos(a)*d, Math.sin(a)*d));
  }
  // Środkowa
  for(let i=0;i<60;i++){
    const a=(i/60)*Math.PI*2+Math.random()*0.6, d=10+Math.random()*14;
    trees.push(Math.random()<0.2 ? addDeadTree(Math.cos(a)*d,Math.sin(a)*d) : addTree(Math.cos(a)*d,Math.sin(a)*d));
  }
  // Zewnętrzna warstwa 1
  for(let i=0;i<100;i++){
    const a=Math.random()*Math.PI*2, d=24+Math.random()*14;
    trees.push(Math.random()<0.15 ? addDeadTree(Math.cos(a)*d,Math.sin(a)*d) : addTree(Math.cos(a)*d,Math.sin(a)*d));
  }
  // Zewnętrzna warstwa 2 — daleki las
  for(let i=0;i<140;i++){
    const a=Math.random()*Math.PI*2, d=38+Math.random()*18;
    trees.push(addTree(Math.cos(a)*d, Math.sin(a)*d));
  }
  // Ściana zewnętrzna
  for(let i=0;i<80;i++){
    const a=(i/80)*Math.PI*2, d=56+Math.random()*6;
    trees.push(addTree(Math.cos(a)*d, Math.sin(a)*d));
  }
  // ─────────────────────────────────────────────────────────

  // Kamienie
  for(let i=0;i<80;i++){
    const a=Math.random()*Math.PI*2, d=2+Math.random()*55, s=0.1+Math.random()*0.5;
    const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(s,0),
      new THREE.MeshLambertMaterial({color:new THREE.Color(0.035,0.04,0.028)}));
    rock.position.set(Math.cos(a)*d, s*0.35, Math.sin(a)*d);
    rock.rotation.set(Math.random(),Math.random(),Math.random());
    scene.add(rock);
  }

  // Cząsteczki mgły
  const mistPos = new Float32Array(400*3);
  for(let i=0;i<400;i++){
    const a=Math.random()*Math.PI*2, d=Math.random()*55;
    mistPos[i*3]=Math.cos(a)*d; mistPos[i*3+1]=Math.random()*1.4; mistPos[i*3+2]=Math.sin(a)*d;
  }
  const mistGeo = new THREE.BufferGeometry();
  mistGeo.setAttribute('position', new THREE.BufferAttribute(mistPos,3));
  const mist = new THREE.Points(mistGeo, new THREE.PointsMaterial({color:0x0a1a0a,size:1.6,transparent:true,opacity:0.14,sizeAttenuation:true}));
  scene.add(mist);

  // Sterowanie
  const keys = {};
  document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
  });
  document.addEventListener('keyup', e => { keys[e.code] = false; });

  let yaw=0, pitch=0, locked=false, t=0;

  container.addEventListener('click', () => container.requestPointerLock());
  document.addEventListener('pointerlockchange', () => {
    locked = document.pointerLockElement === container;
    document.getElementById('click_msg').style.opacity = locked ? '0' : '1';
  });
  document.addEventListener('mousemove', e => {
    if(!locked) return;
    yaw   -= e.movementX * 0.0022;
    pitch  = Math.max(-0.55, Math.min(0.55, pitch - e.movementY*0.0022));
  });

  function collides(nx, nz){
    if(Math.sqrt(nx*nx+nz*nz) > 58) return true;
    for(const tr of trees){
      const dx=nx-tr.x, dz=nz-tr.z;
      if(dx*dx+dz*dz < (tr.r+0.3)*(tr.r+0.3)) return true;
    }
    return false;
  }

  const fwd=new THREE.Vector3(), rgt=new THREE.Vector3();
  const SPEED = 0.058;

  // Kierunek latarki — wektor pomocniczy
  const flDir = new THREE.Vector3();

  function loop(){
    requestAnimationFrame(loop);
    t += 0.016;

    camera.rotation.order = 'YXZ';
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;

    fwd.set(Math.sin(yaw), 0, Math.cos(yaw));
    rgt.set(Math.cos(yaw), 0, -Math.sin(yaw));

    let mx=0, mz=0;
    if(keys['KeyW']||keys['ArrowUp'])    { mx-=fwd.x; mz-=fwd.z; }
    if(keys['KeyS']||keys['ArrowDown'])  { mx+=fwd.x; mz+=fwd.z; }
    if(keys['KeyA']||keys['ArrowLeft'])  { mx-=rgt.x; mz-=rgt.z; }
    if(keys['KeyD']||keys['ArrowRight']) { mx+=rgt.x; mz+=rgt.z; }

    const len = Math.sqrt(mx*mx+mz*mz);
    if(len>0){ mx=mx/len*SPEED; mz=mz/len*SPEED; }

    const nx=camera.position.x+mx, nz=camera.position.z+mz;
    if(!collides(nx,nz)){ camera.position.x=nx; camera.position.z=nz; }

    const bob = len>0 ? Math.sin(t*8)*0.04 : 0;
    camera.position.y = 1.65 + bob;

    // ── Aktualizacja latarki ──
    // Pozycja latarki = przy kamerze, lekko niżej i z boku (trzymana ręka)
    const handOff = new THREE.Vector3(0.22, -0.12, 0);
    handOff.applyEuler(new THREE.Euler(0, yaw, 0));
    flashlight.position.copy(camera.position).add(handOff);
    flFill.position.copy(camera.position);

    // Target latarki — punkt przed kamerą w kierunku patrzenia
    flDir.set(
      Math.sin(yaw) * Math.cos(pitch),
      Math.sin(pitch),
      Math.cos(yaw) * Math.cos(pitch)
    ).multiplyScalar(-1);
    flashTarget.position.copy(camera.position).add(flDir.multiplyScalar(12));
    // ─────────────────────────────────────────────────────

    mist.rotation.y += 0.00025;

    renderer.render(scene, camera);
  }
  loop();

  window.addEventListener('resize', () => {
    const w=window.innerWidth, h=window.innerHeight;
    camera.aspect = w/h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });
})();
</script>
</body>
</html>
