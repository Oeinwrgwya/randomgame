<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Cosmic Edition</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:monospace;overflow:hidden}
#space{position:fixed;inset:0;z-index:-1;pointer-events:none}
#wrap{display:flex;flex-direction:column;align-items:center;gap:12px;padding:8px 0}
#hud{display:flex;gap:32px;font-size:13px;color:#888}
#hud span{font-size:18px;font-weight:500;color:#fff;display:block}
canvas#c{border-radius:8px;border:1px solid #2a2d3a;display:block;background:rgba(15,17,23,.85)}
#msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a1d27;border:1px solid #3a3d4a;border-radius:10px;padding:20px 32px;text-align:center;color:#fff}
#cw{position:relative}
#btns{display:grid;grid-template-columns:repeat(3,44px);grid-template-rows:repeat(2,44px);gap:4px}
#btns button{font-size:18px;border-radius:6px;width:44px;height:44px;background:#1a1d27;border:1px solid #3a3d4a;color:#fff}
</style>
</head>
<body>
<canvas id="space"></canvas>
<div id="wrap">
<div id="hud">
<div>Wynik<span id="sc">0</span></div>
<div>Rekord<span id="hi">0</span></div>
<div>Poziom<span id="lv">1</span></div>
</div>
<div id="cw">
<canvas id="c" width="440" height="440"></canvas>
<div id="msg"><h3>🐍 Wąż</h3><p>Naciśnij spację aby zacząć</p></div>
</div>
<div id="btns">
<button onclick="dir(0,-1)">▲</button>
<button onclick="dir(-1,0)">◄</button>
<button onclick="dir(0,1)">▼</button>
<button onclick="dir(1,0)">►</button>
</div>
</div>

<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const CELL=20,COLS=22,ROWS=22;
const scEl=document.getElementById('sc'),hiEl=document.getElementById('hi'),lvEl=document.getElementById('lv');
const msg=document.getElementById('msg');
let snake,dx,dy,ndx,ndy,food,score=0,hi=0,level=1,alive=false,loop,growing=0;

function init(){
snake=[{x:11,y:11},{x:10,y:11},{x:9,y:11}];
dx=1;dy=0;ndx=1;ndy=0;score=0;level=1;growing=0;
scEl.textContent=0;lvEl.textContent=1;
placeFood();alive=true;msg.style.display='none';
clearInterval(loop);loop=setInterval(tick,140);
}

function placeFood(){
do{food={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)}}
while(snake.some(s=>s.x===food.x&&s.y===food.y));
}

function tick(){
dx=ndx;dy=ndy;
let head={x:snake[0].x+dx,y:snake[0].y+dy};
if(head.x<0||head.y<0||head.x>=COLS||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)){die();return;}
snake.unshift(head);
if(head.x===food.x&&head.y===food.y){
score+=10*level;
if(score>hi){hi=score;hiEl.textContent=hi;}
level=1+Math.floor(score/100);
scEl.textContent=score;lvEl.textContent=level;
placeFood();
}else snake.pop();
draw();
}

function die(){
alive=false;clearInterval(loop);
msg.style.display='block';
msg.innerHTML='<h3>💀 Koniec!</h3><p>Wynik: '+score+'</p>';
}

function dir(x,y){
if(x===1&&dx===-1)return;
if(x===-1&&dx===1)return;
if(y===1&&dy===-1)return;
if(y===-1&&dy===1)return;
ndx=x;ndy=y;
}

function draw(){
ctx.fillStyle='#0f1117';ctx.fillRect(0,0,440,440);
ctx.fillStyle='#f97316';
ctx.beginPath();
ctx.arc(food.x*20+10,food.y*20+10,8,0,Math.PI*2);
ctx.fill();
snake.forEach((s,i)=>{
ctx.fillStyle=i?'#22c55e':'#4ade80';
ctx.fillRect(s.x*20+1,s.y*20+1,18,18);
});
}
document.addEventListener('keydown',e=>{
if(e.key===' ') {if(!alive)init();}
if(e.key==='ArrowUp')dir(0,-1);
if(e.key==='ArrowDown')dir(0,1);
if(e.key==='ArrowLeft')dir(-1,0);
if(e.key==='ArrowRight')dir(1,0);
});

// Kosmiczne tło
const space=document.getElementById('space');
const sctx=space.getContext('2d');
function resize(){space.width=innerWidth;space.height=innerHeight}
resize();addEventListener('resize',resize);
const stars=[...Array(250)].map(()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*2,a:Math.random()*6}));
const comets=[];
setInterval(()=>{if(Math.random()<0.4)comets.push({x:-50,y:Math.random()*innerHeight,vx:4+Math.random()*4,vy:-1+Math.random()*2,l:180})},4000);

function cosmos(){
sctx.clearRect(0,0,space.width,space.height);
stars.forEach(s=>{
s.a+=0.03;
sctx.fillStyle=`rgba(255,255,255,${0.3+Math.abs(Math.sin(s.a))*0.7})`;
sctx.beginPath();sctx.arc(s.x,s.y,s.r,0,Math.PI*2);sctx.fill();
});
for(let i=comets.length-1;i>=0;i--){
let c=comets[i];
c.x+=c.vx;c.y+=c.vy;c.l--;
sctx.strokeStyle=`rgba(255,255,255,${c.l/180})`;
sctx.beginPath();sctx.moveTo(c.x,c.y);sctx.lineTo(c.x-c.vx*10,c.y-c.vy*10);sctx.stroke();
if(c.l<=0)comets.splice(i,1);
}
requestAnimationFrame(cosmos);
}
cosmos();
</script>
</body>
</html>
